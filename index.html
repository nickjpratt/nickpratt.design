<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nick Pratt is a product designer building AI-fluent experiences for the way people actually use technology. First-gen SCAD grad, New York bound."
    />
    <title>Nick Pratt — Product Designer</title>
    <!--
      Resolve the theme before first paint so there is no flash of the wrong mode.
      Manual choice in localStorage wins; otherwise follow the OS preference.
    -->
    <script>
      (function () {
        try {
          // A saved manual choice wins; otherwise follow the device preference.
          var saved = localStorage.getItem('npp-theme-2');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
        } catch (e) {
          /* matchMedia / storage blocked: keep the light fallback already on <html> */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
