<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nickpratt.design</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0e0e10;
      color: #f5f5f7;
      text-align: center;
      padding: 1.5rem;
    }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 0.5rem; letter-spacing: -0.02em; }
    p { margin: 0; color: #9a9aa3; font-size: 1.1rem; }
  </style>
</head>
<body>
  <main>
    <h1 id="env">nickpratt.design</h1>
    <p>✅ Vercel deployment is working</p>
  </main>
  <script>
    // Environment label is derived from the hostname at runtime, so this file
    // stays identical across branches and never causes merge conflicts.
    (function () {
      var host = location.hostname;
      var label;
      if (host === 'nickpratt.design' || host === 'www.nickpratt.design' || host === 'nickpratt-design.vercel.app') {
        label = 'PRODUCTION';
      } else if (host.indexOf('-git-staging-') !== -1) {
        label = 'STAGING';
      } else if (host === 'localhost' || host === '127.0.0.1' || host === '') {
        label = 'LOCAL';
      } else if (host.indexOf('-git-') !== -1) {
        var m = host.match(/-git-(.+?)-[a-z0-9-]+\.vercel\.app$/);
        label = m ? 'PREVIEW · ' + m[1] : 'PREVIEW';
      } else {
        label = 'PREVIEW';
      }
      document.getElementById('env').textContent = label + ' ENVIRONMENT';
      document.title = 'nickpratt.design — ' + label;
    })();
  </script>
</body>
</html>
